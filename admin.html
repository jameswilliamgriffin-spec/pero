<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perro — Admin</title>
  <link rel="stylesheet" href="css/fonts.css">
  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow Condensed', sans-serif;
      background: #191919;
      color: #C8EC66;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .admin {
      width: 100%;
      max-width: 480px;
    }

    .admin__logo {
      width: 140px;
      margin-bottom: 2rem;
      filter: invert(1);
      opacity: 0.8;
    }

    .admin__title {
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .admin__sub {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 2rem;
    }

    .admin__field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .admin__label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .admin__input {
      background: transparent;
      border: 1px solid rgba(200,236,102,0.3);
      color: #C8EC66;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .admin__input:focus {
      border-color: #C8EC66;
    }

    .admin__btn {
      width: 100%;
      background: #C8EC66;
      color: #191919;
      border: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 1rem;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .admin__btn:hover:not(:disabled) {
      background: #D25D27;
      color: #fff;
    }

    .admin__btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .admin__status {
      margin-top: 1rem;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      min-height: 1.5rem;
      opacity: 0.7;
      transition: opacity 0.4s ease;
    }

    .admin__status--success { color: #C8EC66; }
    .admin__status--error   { color: #D25D27; }
    .admin__status--fade    { opacity: 0; }

    #adminLogin { display: block; }
    #adminPanel { display: none; }

    .admin__current {
      border: 1px solid rgba(200,236,102,0.2);
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      opacity: 0.6;
    }

    .admin__divider {
      border: none;
      border-top: 1px solid rgba(200,236,102,0.15);
      margin: 2rem 0;
    }

    .admin__back {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #C8EC66;
      opacity: 0.4;
      text-decoration: none;
    }

    .admin__back:hover { opacity: 0.8; }
    .admin__back--disabled {
      pointer-events: none;
      opacity: 0.2;
    }

    /* CURRENT MENU PREVIEW */
    .admin__preview {
      border: 1px solid rgba(200,236,102,0.2);
      margin-bottom: 1.5rem;
      overflow: hidden;
      display: none;
    }

    .admin__preview iframe {
      width: 100%;
      height: 220px;
      border: none;
      display: block;
      background: #0e0e0e;
    }

    .admin__preview-caption {
      padding: 0.6rem 1rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.5;
      border-top: 1px solid rgba(200,236,102,0.15);
    }

    /* DROPZONE */
    .admin__dropzone {
      border: 1px dashed rgba(200,236,102,0.35);
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .admin__dropzone:hover,
    .admin__dropzone--active {
      border-color: #C8EC66;
      background: rgba(200,236,102,0.05);
    }

    .admin__dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .admin__dropzone-text {
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      opacity: 0.6;
    }

    .admin__dropzone-sub {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.35;
      margin-top: 0.4rem;
    }

    /* SELECTED FILE PREVIEW */
    .admin__file-preview {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      border: 1px solid rgba(200,236,102,0.25);
      padding: 0.75rem 1rem;
      margin-top: 0.75rem;
      font-size: 0.8rem;
    }

    .admin__file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .admin__file-size {
      opacity: 0.5;
      font-size: 0.7rem;
      flex-shrink: 0;
    }

    .admin__file-clear {
      background: none;
      border: none;
      color: #D25D27;
      cursor: pointer;
      font-size: 0.9rem;
      flex-shrink: 0;
      line-height: 1;
      padding: 0.2rem;
    }

    /* PROGRESS BAR */
    .admin__progress {
      display: none;
      height: 4px;
      background: rgba(200,236,102,0.15);
      margin-top: 1rem;
      overflow: hidden;
    }

    .admin__progress-bar {
      height: 100%;
      width: 0%;
      background: #C8EC66;
      transition: width 0.15s ease;
    }

  </style>
</head>
<body>

<div class="admin">

  <img class="admin__logo" src="assets/images/logo.png" alt="Perro">

  <!-- LOGIN SCREEN -->
  <div id="adminLogin">
    <h1 class="admin__title">Admin</h1>
    <p class="admin__sub">Perro — Menu Management</p>

    <div class="admin__field">
      <label class="admin__label" for="adminPassword">Password</label>
      <input class="admin__input"
             type="password"
             id="adminPassword"
             placeholder="Enter password"
             autocomplete="current-password">
    </div>

    <button class="admin__btn" id="loginBtn">Login</button>

    <p class="admin__status" id="loginStatus"></p>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <h1 class="admin__title">Menu Upload</h1>
    <p class="admin__sub">Upload a new menu PDF</p>

    <div class="admin__current" id="currentMenuInfo">
      Checking current menu...
    </div>

    <div class="admin__preview" id="menuPreview">
      <iframe id="menuPreviewFrame" title="Current menu preview"></iframe>
      <div class="admin__preview-caption">Live preview of current menu</div>
    </div>

    <hr class="admin__divider">

    <div class="admin__field">
      <label class="admin__label" for="menuFile">Select menu PDF</label>

      <div class="admin__dropzone" id="dropzone">
        <input type="file" id="menuFile" accept=".pdf">
        <div class="admin__dropzone-text">Drop PDF here or click to browse</div>
        <div class="admin__dropzone-sub">PDF only · 20MB max</div>
      </div>

      <div class="admin__file-preview" id="filePreview">
        <span class="admin__file-name" id="fileName"></span>
        <span class="admin__file-size" id="fileSize"></span>
        <button type="button" class="admin__file-clear" id="fileClear" title="Remove selected file">✕</button>
      </div>
    </div>

    <button class="admin__btn" id="uploadBtn">Upload Menu</button>

    <div class="admin__progress" id="progressWrap">
      <div class="admin__progress-bar" id="progressBar"></div>
    </div>

    <p class="admin__status" id="uploadStatus"></p>

    <hr class="admin__divider">

    <button class="admin__btn"
            id="removeBtn"
            style="background:transparent; color:#D25D27; border:1px solid #D25D27;">
      Remove Current Menu
    </button>

    <a href="index.html" class="admin__back" id="backLink">← Back to site</a>
  </div>

</div>

<script>
/* ----------------------------------------
   ADMIN — simple client-side password gate
   Change ADMIN_PASSWORD below
   ---------------------------------------- */

const ADMIN_PASSWORD = 'Goldie2026';

let isBusy = false; // true while an upload/remove request is in flight

document.getElementById('loginBtn').addEventListener('click', () => {
  const pw     = document.getElementById('adminPassword').value;
  const status = document.getElementById('loginStatus');

  if (pw === ADMIN_PASSWORD) {
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    checkCurrentMenu();
  } else {
    status.textContent = 'Incorrect password.';
    status.className   = 'admin__status admin__status--error';
  }
});

document.getElementById('adminPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

/* ----------------------------------------
   STATUS TOASTS (auto-dismiss)
   ---------------------------------------- */

let statusTimer = null;

function setStatus(message, type) {
  const status = document.getElementById('uploadStatus');
  clearTimeout(statusTimer);
  status.classList.remove('admin__status--fade');
  status.textContent = message;
  status.className   = 'admin__status' + (type ? ' admin__status--' + type : '');

  if (type === 'success') {
    statusTimer = setTimeout(() => {
      status.classList.add('admin__status--fade');
    }, 4000);
  }
}

/* ----------------------------------------
   CURRENT MENU + PREVIEW
   ---------------------------------------- */

async function checkCurrentMenu() {
  const info       = document.getElementById('currentMenuInfo');
  const preview    = document.getElementById('menuPreview');
  const previewFrm = document.getElementById('menuPreviewFrame');

  try {
    const res  = await fetch('/api/current-menu', { cache: 'no-cache' });
    const data = await res.json();

    if (data.exists && data.url) {
      const date = new Date(data.updated).toLocaleDateString('en-GB');
      info.textContent     = 'Current menu uploaded ' + date;
      previewFrm.src        = data.url;
      preview.style.display = 'block';
    } else {
      info.textContent      = 'No menu currently uploaded.';
      preview.style.display = 'none';
      previewFrm.src         = '';
    }
  } catch {
    info.textContent      = 'No menu currently uploaded.';
    preview.style.display = 'none';
    previewFrm.src         = '';
  }
}

/* ----------------------------------------
   FILE SELECTION — dropzone + preview
   ---------------------------------------- */

const dropzone     = document.getElementById('dropzone');
const fileInput    = document.getElementById('menuFile');
const filePreview  = document.getElementById('filePreview');
const fileNameEl   = document.getElementById('fileName');
const fileSizeEl   = document.getElementById('fileSize');
const fileClearBtn = document.getElementById('fileClear');

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function showSelectedFile(file) {
  fileNameEl.textContent     = file.name;
  fileSizeEl.textContent     = formatBytes(file.size);
  filePreview.style.display  = 'flex';
}

function clearSelectedFile() {
  fileInput.value = '';
  filePreview.style.display = 'none';
}

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) {
    const file = fileInput.files[0];
    if (file.type === 'application/pdf') {
      showSelectedFile(file);
      setStatus('', '');
    } else {
      clearSelectedFile();
      setStatus('Please select a PDF file.', 'error');
    }
  } else {
    clearSelectedFile();
  }
});

fileClearBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  clearSelectedFile();
});

['dragenter', 'dragover'].forEach(evt => {
  dropzone.addEventListener(evt, (e) => {
    e.preventDefault();
    dropzone.classList.add('admin__dropzone--active');
  });
});

['dragleave', 'drop'].forEach(evt => {
  dropzone.addEventListener(evt, (e) => {
    e.preventDefault();
    dropzone.classList.remove('admin__dropzone--active');
  });
});

dropzone.addEventListener('drop', (e) => {
  const dropped = e.dataTransfer.files;
  if (dropped.length) {
    fileInput.files = dropped;
    fileInput.dispatchEvent(new Event('change'));
  }
});

/* ----------------------------------------
   UPLOAD — with progress bar + button states
   ---------------------------------------- */

const uploadBtn    = document.getElementById('uploadBtn');
const removeBtn    = document.getElementById('removeBtn');
const backLink     = document.getElementById('backLink');
const progressWrap = document.getElementById('progressWrap');
const progressBar  = document.getElementById('progressBar');

function setBusy(busy) {
  isBusy = busy;
  uploadBtn.disabled = busy;
  removeBtn.disabled = busy;
  if (busy) {
    backLink.classList.add('admin__back--disabled');
  } else {
    backLink.classList.remove('admin__back--disabled');
  }
}

window.addEventListener('beforeunload', (e) => {
  if (isBusy) {
    e.preventDefault();
    e.returnValue = '';
  }
});

uploadBtn.addEventListener('click', () => {
  if (!fileInput.files.length) {
    setStatus('Please select a PDF file.', 'error');
    return;
  }

  const file = fileInput.files[0];

  if (file.type !== 'application/pdf') {
    setStatus('Please select a PDF file.', 'error');
    return;
  }

  const formData = new FormData();
  formData.append('menu', file);

  setBusy(true);
  setStatus('Uploading...', '');
  progressWrap.style.display = 'block';
  progressBar.style.width    = '0%';

  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/upload-menu');

  xhr.upload.addEventListener('progress', (e) => {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100);
      progressBar.style.width = pct + '%';
    }
  });

  xhr.addEventListener('load', () => {
    setBusy(false);
    progressWrap.style.display = 'none';

    if (xhr.status >= 200 && xhr.status < 300) {
      setStatus('Menu uploaded successfully.', 'success');
      clearSelectedFile();
      checkCurrentMenu();
    } else {
      setStatus('Upload failed. Is the server running?', 'error');
    }
  });

  xhr.addEventListener('error', () => {
    setBusy(false);
    progressWrap.style.display = 'none';
    setStatus('Upload failed. Is the server running?', 'error');
  });

  xhr.send(formData);
});

removeBtn.addEventListener('click', async () => {
  if (!confirm('Remove the current menu from the site?')) return;

  setBusy(true);
  setStatus('Removing...', '');

  try {
    const res = await fetch('/api/remove-menu', { method: 'POST' });
    if (res.ok) {
      setStatus('Menu removed.', 'success');
      checkCurrentMenu();
    } else {
      throw new Error('Remove failed');
    }
  } catch (err) {
    setStatus('Remove failed. Is the server running?', 'error');
  } finally {
    setBusy(false);
  }
});
</script>

</body>
</html>
